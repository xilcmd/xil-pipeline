name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg_extract
          $bin = (Get-ChildItem C:\ffmpeg_extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1).DirectoryName
          echo $bin >> $env:GITHUB_PATH
      - name: Install package with dev dependencies
        run: pip install -e ".[all,dev]"
      - name: Lint
        run: ruff check src/xil_pipeline/
      - name: Run tests
        run: pytest tests/ -v --tb=short
